<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1923; color: #e0e6ed; overflow: hidden; height: 100vh; }

.header { background: linear-gradient(135deg, #1a2634 0%, #0d1b2a 100%); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e3a5f; height: 50px; }

.header .stats { display: flex; gap: 20px; font-size: 12px; color: #8899aa; }
.header .stats span { color: #4fc3f7; font-weight: 600; }

.main { display: flex; height: calc(100vh - 50px); }
#map { flex: 1; min-width: 0; }

.panel { width: 440px; background: #0d1b2a; border-left: 1px solid #1e3a5f; display: flex; flex-direction: column; overflow: hidden; transition: width 0.3s; }
.panel.collapsed { width: 0; border: none; }
.toggle-panel { position: absolute; right: 440px; top: 55px; z-index: 1000; background: #1a2634; border: 1px solid #1e3a5f; color: #4fc3f7; padding: 5px 8px; cursor: pointer; border-radius: 4px 0 0 4px; font-size: 14px; transition: right 0.3s; }
.toggle-panel.collapsed { right: 0; }

.filters { padding: 10px; background: #11222e; border-bottom: 1px solid #1e3a5f; flex-shrink: 0; }
.filters h3 { font-size: 12px; color: #4fc3f7; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.filter-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.filter-group { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 90px; }
.filter-group label { font-size: 10px; color: #667788; text-transform: uppercase; }
.filter-group select, .filter-group input { background: #1a2634; border: 1px solid #1e3a5f; color: #e0e6ed; padding: 4px 6px; border-radius: 4px; font-size: 11px; }

.sort-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.sort-btn { background: #1a2634; border: 1px solid #1e3a5f; color: #8899aa; padding: 3px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; }
.sort-btn.active { background: #1e3a5f; color: #4fc3f7; }

.legend { padding: 6px 10px; background: #11222e; border-bottom: 1px solid #1e3a5f; flex-shrink: 0; }
.legend-title { font-size: 10px; color: #667788; margin-bottom: 4px; }
.legend-bar { display: flex; height: 12px; border-radius: 3px; overflow: hidden; }
.legend-bar div { flex: 1; }
.legend-labels { display: flex; justify-content: space-between; font-size: 9px; color: #667788; margin-top: 2px; }

.condo-list { flex: 1; overflow-y: auto; padding: 4px; }
.condo-list::-webkit-scrollbar { width: 6px; }
.condo-list::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }

.condo-card { background: #1a2634; border: 1px solid #1e3a5f; border-radius: 6px; padding: 10px; margin-bottom: 4px; cursor: pointer; transition: all 0.15s; }
.condo-card:hover { border-color: #4fc3f7; background: #1e2d3d; }
.condo-card.selected { border-color: #4fc3f7; background: #1a3350; }
.condo-name { font-size: 13px; font-weight: 600; color: #e0e6ed; margin-bottom: 4px; }
.condo-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.condo-tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #0d1b2a; }
.tag-year { color: #81c784; } .tag-units { color: #ba68c8; } .tag-size { color: #4fc3f7; } .tag-yield { color: #f06292; }
.condo-prices { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; }
.price-col { flex: 1; }
.price-label { font-size: 9px; color: #667788; text-transform: uppercase; }
.price-value { font-weight: 600; }
.sale-price { color: #ffb74d; } .rent-price { color: #4dd0e1; } .yield-value { color: #f06292; }

.leaflet-popup-content-wrapper { background: #1a2634 !important; color: #e0e6ed !important; border-radius: 8px !important; border: 1px solid #1e3a5f; }
.leaflet-popup-tip { background: #1a2634 !important; }
.leaflet-popup-content { margin: 10px 14px !important; }
.popup-title { font-size: 14px; font-weight: 700; color: #4fc3f7; margin-bottom: 6px; }
.popup-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #0d1b2a; }
.popup-label { color: #667788; } .popup-val { font-weight: 600; }

.map-legend { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: rgba(13,27,42,0.92); padding: 10px 14px; border-radius: 8px; border: 1px solid #1e3a5f; }
.map-legend-title { font-size: 11px; color: #4fc3f7; font-weight: 600; margin-bottom: 6px; }
.map-legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #8899aa; margin: 3px 0; }
.map-legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

.summary-bar { padding: 6px 10px; background: #0a1520; border-bottom: 1px solid #1e3a5f; display: flex; gap: 12px; font-size: 10px; flex-shrink: 0; }
.summary-item { display: flex; flex-direction: column; align-items: center; }

</style>
</head>

    <div class="filters">

            <option value="0-500">&lt; 500</option>
            <option value="500-700">500-700</option>
            <option value="700-900">700-900</option>
            <option value="900-1100">900-1,100</option>
            <option value="1100-9999">&gt; 1,100</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Rent (RM/mo)</label>
          <select id="fRent" onchange="applyFilters()">
            <option value="">All</option>
            <option value="0-3000">&lt; 3K</option>
            <option value="3000-5000">3-5K</option>
            <option value="5000-8000">5-8K</option>
            <option value="8000-12000">8-12K</option>
            <option value="12000-99999">&gt; 12K</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Year Built</label>
          <select id="fYear" onchange="applyFilters()">
            <option value="">All</option>
            <option value="1990-2000">&lt; 2000</option>
            <option value="2000-2010">2000-09</option>
            <option value="2010-2020">2010-19</option>
            <option value="2020-2030">2020+</option>
          </select>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <label>Size (sqft)</label>
          <select id="fSize" onchange="applyFilters()">
            <option value="">All</option>
            <option value="0-800">&lt; 800</option>
            <option value="800-1500">800-1,500</option>
            <option value="1500-2500">1,500-2,500</option>
            <option value="2500-99999">&gt; 2,500</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Yield (%)</label>
          <select id="fYield" onchange="applyFilters()">
            <option value="">All</option>
            <option value="0-3">&lt; 3%</option>
            <option value="3-4">3-4%</option>
            <option value="4-5">4-5%</option>
            <option value="5-99">&gt; 5%</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Color By</label>
          <select id="fColorBy" onchange="applyFilters()">
            <option value="salePsf">Sale PSF</option>
            <option value="rentPsf">Rent PSF</option>
            <option value="yield">Yield %</option>
            <option value="year">Year Built</option>
          </select>
        </div>
      </div>
      <div class="sort-row">
        <span style="font-size:10px;color:#667788;margin-right:4px;">Sort:</span>
        <button class="sort-btn active" data-sort="name" onclick="setSort(this)">Name</button>
        <button class="sort-btn" data-sort="salePsfLow" onclick="setSort(this)">PSF ↑</button>
        <button class="sort-btn" data-sort="salePsfHigh" onclick="setSort(this)">PSF ↓</button>
        <button class="sort-btn" data-sort="rentLow" onclick="setSort(this)">Rent ↑</button>

        <button class="sort-btn" data-sort="yearOld" onclick="setSort(this)">Oldest</button>
      </div>
    </div>

      <div class="legend-labels" id="legendLabels"></div>
    </div>

  {name:"TWY Mont Kiara",year:2021,units:484,sizeMin:662,sizeMax:1385,rentMin:2500,rentMax:7000,salePsfMin:900,salePsfMax:1000,lat:3.1758,lng:101.6535},
  {name:"Verve Suites Mont Kiara",year:2013,units:933,sizeMin:462,sizeMax:1394,rentMin:2000,rentMax:6000,salePsfMin:850,salePsfMax:1000,lat:3.1675,lng:101.6555},
  {name:"Vista Kiara",year:1997,units:409,sizeMin:1230,sizeMax:1410,rentMin:3000,rentMax:4500,salePsfMin:500,salePsfMax:550,lat:3.1693,lng:101.6498}
];

// Derived fields
CONDOS.forEach(c => {
  c.salePsfMid = (c.salePsfMin + c.salePsfMax) / 2;
  c.rentMid = (c.rentMin + c.rentMax) / 2;
  c.sizeMid = (c.sizeMin + c.sizeMax) / 2;
  c.yield = c.salePsfMid * c.sizeMid > 0 ? (c.rentMid * 12) / (c.salePsfMid * c.sizeMid) * 100 : 0;
  c.rentPsf = c.sizeMid > 0 ? c.rentMid / c.sizeMid : 0;
});

// Map
const map = L.map('map', {zoomControl: true}).setView([3.1700, 101.6520], 15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
}).addTo(map);

// Color scales
const CS = {
  salePsf: {label:'Sale PSF (RM)',min:350,max:1400,colors:['#2196f3','#4caf50','#ffeb3b','#ff9800','#f44336']},
  rentPsf: {label:'Rent PSF (RM/mo)',min:1.5,max:5,colors:['#2196f3','#4caf50','#ffeb3b','#ff9800','#f44336']},
  yield:   {label:'Gross Yield (%)',min:2,max:6,colors:['#f44336','#ff9800','#ffeb3b','#4caf50','#2196f3']},
  year:    {label:'Year Built',min:1993,max:2025,colors:['#f44336','#ff9800','#ffeb3b','#4caf50','#2196f3']}
};

function hexRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function getColor(v,s){const sc=CS[s],t=Math.max(0,Math.min(1,(v-sc.min)/(sc.max-sc.min))),i=t*(sc.colors.length-1),lo=Math.floor(i),hi=Math.ceil(i),f=i-lo,a=hexRgb(sc.colors[lo]),b=hexRgb(sc.colors[hi]);return`rgb(${Math.round(a.r+(b.r-a.r)*f)},${Math.round(a.g+(b.g-a.g)*f)},${Math.round(a.b+(b.b-a.b)*f)})`;}
function colVal(c,s){return s==='salePsf'?c.salePsfMid:s==='rentPsf'?c.rentPsf:s==='yield'?c.yield:c.year;}

let markers={}, selectedCondo=null, currentSort='name', filtered=[...CONDOS];

function mkMarker(c,cs){
  const color=getColor(colVal(c,cs),cs);
  const m=L.circleMarker([c.lat,c.lng],{radius:Math.max(6,Math.min(14,Math.sqrt(c.units)/2)),fillColor:color,color:'#fff',weight:1.5,opacity:0.9,fillOpacity:0.85});
  m.bindPopup(`<div style="min-width:260px"><div class="popup-title">${c.name}</div>
    <div class="popup-row"><span class="popup-label">Year</span><span class="popup-val">${c.year}</span></div>
    <div class="popup-row"><span class="popup-label">Units</span><span class="popup-val">${c.units.toLocaleString()}</span></div>
    <div class="popup-row"><span class="popup-label">Size</span><span class="popup-val">${c.sizeMin.toLocaleString()}-${c.sizeMax.toLocaleString()} sqft</span></div>
    <div class="popup-row"><span class="popup-label">Sale PSF</span><span class="popup-val" style="color:#ffb74d">RM ${c.salePsfMin}-${c.salePsfMax}</span></div>
    <div class="popup-row"><span class="popup-label">Rent/mo</span><span class="popup-val" style="color:#4dd0e1">RM ${c.rentMin.toLocaleString()}-${c.rentMax.toLocaleString()}</span></div>
    <div class="popup-row"><span class="popup-label">Rent PSF</span><span class="popup-val" style="color:#4dd0e1">RM ${c.rentPsf.toFixed(2)}</span></div>
    <div class="popup-row"><span class="popup-label">Gross Yield</span><span class="popup-val" style="color:#f06292">${c.yield.toFixed(1)}%</span></div></div>`);
  m.on('click',()=>selectCondo(c.name));
  return m;
}

function rebuild(){
  const cs=document.getElementById('fColorBy').value;
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  const ns=new Set(filtered.map(c=>c.name));
  CONDOS.forEach(c=>{if(ns.has(c.name)){markers[c.name]=mkMarker(c,cs);markers[c.name].addTo(map);}});
  updateLegend(cs);
}

function updateLegend(s){
  const sc=CS[s];
  document.getElementById('legendTitle').textContent=sc.label;
  const bar=document.getElementById('legendBar');bar.innerHTML='';
  for(let i=0;i<20;i++){const d=document.createElement('div');d.style.background=getColor(sc.min+i/19*(sc.max-sc.min),s);bar.appendChild(d);}
  const fmt=v=>s==='yield'?v.toFixed(1)+'%':s==='year'?Math.round(v):'RM '+Math.round(v);
  document.getElementById('legendLabels').innerHTML=`<span>${fmt(sc.min)}</span><span>${fmt((sc.min+sc.max)/2)}</span><span>${fmt(sc.max)}</span>`;
  const ml=document.getElementById('mapLegend');ml.innerHTML=`<div class="map-legend-title">${sc.label}</div>`;
  [0,.25,.5,.75,1].forEach(t=>{const v=sc.min+t*(sc.max-sc.min);ml.innerHTML+=`<div class="map-legend-item"><div class="map-legend-dot" style="background:${getColor(v,s)}"></div>${fmt(v)}</div>`;});
}

function parseR(v){if(!v)return null;const[a,b]=v.split('-').map(Number);return{min:a,max:b};}
function applyFilters(){
  const q=document.getElementById('fSearch').value.toLowerCase(),sp=parseR(document.getElementById('fSalePsf').value),rn=parseR(document.getElementById('fRent').value),yr=parseR(document.getElementById('fYear').value),sz=parseR(document.getElementById('fSize').value),yl=parseR(document.getElementById('fYield').value);
  filtered=CONDOS.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q))return false;
    if(sp&&(c.salePsfMid<sp.min||c.salePsfMid>sp.max))return false;
    if(rn&&(c.rentMid<rn.min||c.rentMid>rn.max))return false;
    if(yr&&(c.year<yr.min||c.year>yr.max))return false;
    if(sz&&(c.sizeMid<sz.min||c.sizeMid>sz.max))return false;
    if(yl&&(c.yield<yl.min||c.yield>yl.max))return false;
    return true;
  });
  doSort();rebuild();renderList();updateSummary();
}

function doSort(){
  const s=currentSort;
  filtered.sort((a,b)=>s==='name'?a.name.localeCompare(b.name):s==='salePsfLow'?a.salePsfMid-b.salePsfMid:s==='salePsfHigh'?b.salePsfMid-a.salePsfMid:s==='rentLow'?a.rentMid-b.rentMid:s==='rentHigh'?b.rentMid-a.rentMid:s==='yieldHigh'?b.yield-a.yield:s==='yearNew'?b.year-a.year:s==='yearOld'?a.year-b.year:0);
}
function setSort(btn){document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=btn.dataset.sort;doSort();renderList();}

function renderList(){
  document.getElementById('condoList').innerHTML=filtered.map(c=>`
    <div class="condo-card ${selectedCondo===c.name?'selected':''}" onclick="selectCondo('${c.name.replace(/'/g,"\\'")}')">
      <div class="condo-name">${c.name}</div>
      <div class="condo-meta">
        <span class="condo-tag tag-year">${c.year}</span>
        <span class="condo-tag tag-units">${c.units} units</span>
        <span class="condo-tag tag-size">${c.sizeMin.toLocaleString()}-${c.sizeMax.toLocaleString()} sqft</span>
        <span class="condo-tag tag-yield">Yield ${c.yield.toFixed(1)}%</span>
      </div>
      <div class="condo-prices">
        <div class="price-col"><div class="price-label">Sale PSF</div><div class="price-value sale-price">RM ${c.salePsfMin}-${c.salePsfMax}</div></div>
        <div class="price-col"><div class="price-label">Rent/mo</div><div class="price-value rent-price">RM ${c.rentMin.toLocaleString()}-${c.rentMax.toLocaleString()}</div></div>
        <div class="price-col"><div class="price-label">Rent PSF</div><div class="price-value rent-price">RM ${c.rentPsf.toFixed(2)}</div></div>
      </div>
    </div>`).join('');
}

function selectCondo(name){
  selectedCondo=name;
  const c=CONDOS.find(x=>x.name===name);
  if(c&&markers[name]){map.setView([c.lat,c.lng],17);markers[name].openPopup();}
  renderList();
  document.querySelectorAll('.condo-card').forEach(card=>{if(card.querySelector('.condo-name')?.textContent===name)card.scrollIntoView({behavior:'smooth',block:'nearest'});});
}

function updateSummary(){
  document.getElementById('sumTotal').textContent=CONDOS.length;
  document.getElementById('sumFiltered').textContent=filtered.length;
  document.getElementById('totalCount').textContent=CONDOS.length;
  if(filtered.length){
    const sp=filtered.map(c=>c.salePsfMid).sort((a,b)=>a-b),rp=filtered.map(c=>c.rentPsf).sort((a,b)=>a-b),ys=filtered.map(c=>c.yield);
    const ms=sp[Math.floor(sp.length/2)],mr=rp[Math.floor(rp.length/2)],ay=ys.reduce((s,v)=>s+v,0)/ys.length;
    document.getElementById('sumMedianSale').textContent='RM '+Math.round(ms);
    document.getElementById('sumMedianRent').textContent='RM '+mr.toFixed(2);
    document.getElementById('sumAvgYield').textContent=ay.toFixed(1)+'%';
    document.getElementById('medianPsf').textContent='RM '+Math.round(ms);
  }
}

function togglePanel(){
  const p=document.getElementById('panel'),b=document.getElementById('toggleBtn');
  p.classList.toggle('collapsed');b.classList.toggle('collapsed');
  b.innerHTML=p.classList.contains('collapsed')?'&#9654;':'&#9664;';
  setTimeout(()=>map.invalidateSize(),300);
}

applyFilters();
</script>
</body>
</html>
